name: calenfi
description: "Calenfi — кросс-платформенный агрегатор календарей (local-first)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Локальная БД
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Сеть / провайдеры
  dio: ^5.7.0
  xml: ^6.5.0
  pointycastle: ^3.9.1 # MD4/DES для собственной реализации NTLM (EWS)
  crypto: ^3.0.5 # HMAC-MD5 для NTLM

  # Время / рекуррентность
  timezone: ^0.9.4
  rrule: ^0.2.16

  # Безопасное хранилище токенов
  flutter_secure_storage: ^9.2.2

  # Платформенные интеграции
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  collection: ^1.18.0
  home_widget: ^0.9.3

  # Локальные уведомления (напоминания о начале встреч, FR-N)
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
